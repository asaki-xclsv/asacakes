<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    const titles = ["Kaey's Profile", "Equix Games Present", "discord.gg/equixgames"];
    let titleIndex = 0;
    let charIndex = 0;
    let typing = true; // true = typing, false = deleting

    function typeTitle() {
      const currentTitle = titles[titleIndex];
      
      if (typing) {
        document.title = currentTitle.substring(0, charIndex + 1);
        charIndex++;
        if (charIndex === currentTitle.length) {
          typing = false; // start deleting
          setTimeout(typeTitle, 1000); // wait 1 second before deleting
          return;
        }
      } else {
        document.title = currentTitle.substring(0, charIndex - 1);
        charIndex--;
        if (charIndex === 0) {
          typing = true; // start typing next
          titleIndex = (titleIndex + 1) % titles.length;
        }
      }
      setTimeout(typeTitle, typing ? 200 : 100); // typing speed / deleting speed
    }

    typeTitle();
  </script>
    <link rel="stylesheet" href="kaey.css">
</head>
