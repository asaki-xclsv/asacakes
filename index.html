<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #cc0000;
            --bg-deep: #050505;
            --bg-card: rgba(18, 18, 18, 0.95);
            --border-color: rgba(204, 0, 0, 0.3);
            --text-main: #f5f5f5;
            --text-dim: #a0a0a0;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-deep); color: var(--text-main);
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; width: 100vw;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; }

        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; position: relative; z-index: 10; }

        .auth-card {
            background: var(--bg-card); padding: 3rem; border-radius: 12px;
            border: 1px solid var(--border-color); width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px);
        }

        .auth-card h1 { font-weight: 700; margin-bottom: 2rem; color: var(--primary-red); }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.5rem; text-transform: uppercase; }

        input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; border-radius: 6px; color: white; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: var(--primary-red); }

        .btn-primary { width: 100%; padding: 14px; background: var(--primary-red); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 600; }

        #dashboard { display: none; height: 100vh; width: 100vw; grid-template-columns: 280px 1fr; position: relative; z-index: 5; }

        .sidebar { background: rgba(10, 10, 10, 0.8); border-right: 1px solid #222; padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(20px); }
        .sidebar h2 { color: var(--primary-red); font-family: 'JetBrains Mono', monospace; }

        .user-panel { background: #080808; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #1a1a1a; }
        .avatar-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #222; }

        #settings-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: #111; border: 2px solid var(--primary-red); border-radius: 12px;
            z-index: 1000; animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); overflow: hidden;
        }

        @keyframes modalPop { from { opacity: 0; transform: translate(-50%, -40%) scale(0.95); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        .modal-header { 
            background: #181818; padding: 1px 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary-red); cursor: move; 
        }

        .avatar-upload-circle {
            width: 80px; height: 80px; border-radius: 50%; background: #222;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden; border: 2px solid #333;
        }
        .avatar-upload-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center; font-size: 0.7rem;
        }
        .avatar-upload-circle:hover .avatar-overlay { display: flex; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="auth-view" class="auth-container">
        <div class="auth-card">
            <h1>ADMIN ACCESS</h1>
            <div class="input-group"><label>Username</label><input type="text" id="username"></div>
            <div class="input-group"><label>Password</label><input type="password" id="password"></div>
            <button class="btn-primary" onclick="handleAuth()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <h2>ASACAKES</h2>
            <div class="user-panel">
                <img id="sidebar-avatar" src="https://i.imgur.com/6VBx3io.png" class="avatar-img">
                <div>
                    <div id="u-display-name" style="font-weight:600;">Drew</div>
                    <div style="font-size: 0.7rem; color: #888;">Status: Online</div>
                </div>
                <div class="settings-trigger" onclick="toggleModal()" style="cursor:pointer; margin-left:auto;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2 2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </div>
            </div>
        </div>
        <div class="main-content" style="padding: 4rem;">
            <h1>Welcome, <span id="welcome-name">Drew</span></h1>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-header" id="modal-handle">
            <h4 style="font-size: 0.9rem;">User Profile</h4>
            <span style="cursor:pointer;" onclick="toggleModal()">✕</span>
        </div>
        <div class="modal-body" style="padding: 15px;">
            <div class="avatar-upload-circle" onclick="document.getElementById('file-input').click()">
                <img id="modal-avatar" src="https://i.imgur.com/6VBx3io.png">
                <div class="avatar-overlay">Change</div>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="previewAvatar(this)">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top:10px;">
                <label style="color:var(--text-dim); font-size: 0.7rem;">Update Password</label>
                <button onclick="togglePasswordSection()" style="background:none; border:1px solid #cc0000; color:#cc0000; font-size:0.6rem; cursor:pointer; padding:2px 5px;">Change</button>
            </div>
            
            <div id="password-change-section" style="display:none; margin-top:10px;">
                <input type="password" id="curr-password" placeholder="Current Password" style="margin-bottom:10px; padding: 10px;">
                <input type="password" id="new-password" placeholder="New Password" style="margin-bottom:10px; padding: 10px;">
            </div>

            <button class="btn-primary" style="padding: 10px; margin-top: 10px;" onclick="saveSettings()">Apply Changes</button>
            <button onclick="logout()" style="margin-top:10px; width:100%; border:1px solid #cc0000; background:none; color:white; padding:8px; cursor:pointer; font-size: 0.8rem;">Logout</button>
        </div>
    </div>

    <script>

    const titles = ["Asaki", "Asacakes Dashboard", "Developed by Drew"];
    let titleIndex = 0;
    let charIndex = 0;
    let typing = true; // true = typing, false = deleting

    function typeTitle() {
      const currentTitle = titles[titleIndex];
      
      if (typing) {
        document.title = currentTitle.substring(0, charIndex + 1);
        charIndex++;
        if (charIndex === currentTitle.length) {
          typing = false; // start deleting
          setTimeout(typeTitle, 1000); // wait 1 second before deleting
          return;
        }
      } else {
        document.title = currentTitle.substring(0, charIndex - 1);
        charIndex--;
        if (charIndex === 0) {
          typing = true; // start typing next
          titleIndex = (titleIndex + 1) % titles.length;
        }
      }
      setTimeout(typeTitle, typing ? 300 : 100); // typing speed / deleting speed
    }

    typeTitle();




        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        
        // --- AFK Logic ---
        const AFK_LIMIT = 5 * 60 * 1000;
        let logoutTimer;
        function resetTimer() {
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(logout, AFK_LIMIT);
        }

        window.onload = () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                resetTimer();
            }
        };

        window.onmousemove = resetTimer;
        window.onkeypress = resetTimer;
        window.onclick = resetTimer;

        function handleAuth() {
            if (document.getElementById('username').value === "Drew" && document.getElementById('password').value === "asaki17") {
                sessionStorage.setItem('isLoggedIn', 'true');
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                resetTimer();
            } else { alert("Invalid Credentials."); }
        }

        function togglePasswordSection() {
            const section = document.getElementById('password-change-section');
            section.style.display = (section.style.display === 'none') ? 'block' : 'none';
        }

        function previewAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('modal-avatar').src = e.target.result;
                    document.getElementById('sidebar-avatar').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        const modal = document.getElementById('settings-modal');
        function toggleModal() { modal.style.display = (modal.style.display === 'block') ? 'none' : 'block'; }
        
        function saveSettings() { alert("Settings Updated"); toggleModal(); }
        function logout() { sessionStorage.removeItem('isLoggedIn'); location.reload(); }

        const handle = document.getElementById('modal-handle');
        let isDragging = false;
        handle.onmousedown = (e) => { isDragging = true; };
        document.onmousemove = (e) => { 
            if(isDragging) { modal.style.left = e.clientX + 'px'; modal.style.top = e.clientY + 'px'; }
            resetTimer();
        };
        document.onmouseup = () => { isDragging = false; };
    </script>
</body>
</html>
